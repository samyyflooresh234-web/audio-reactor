<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Audio Reactor 2.7</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div id="panel">

<h2>Audio Reactor 2.7</h2>

<input
type="file"
id="audioFile"
accept=".mp3,.wav,.m4a,.aac,.flac,.ogg,audio/*">

<button id="startBtn">
Activar Audio
</button>

<select id="mode">

<option value="ring">
Spectrum Ring
</option>

<option value="spiral">
Spiral
</option>

<option value="spiral2">

    Spiral 2.0

    </option>

</select>

<select id="theme">

<option value="rainbow">
Rainbow
</option>

<option value="cyber">
Cyberpunk
</option>

<option value="matrix">
Matrix
</option>

<option value="ocean">
Ocean
</option>

</select>

<label>

Sensitivity

<input
type="range"
id="sensitivity"
min="1"
max="10"
value="3">

</label>

<label>

Particles

<input
type="range"
id="particles"
min="100"
max="1500"
value="500">

</label>

<label>

Speed

<input
type="range"
id="speed"
min="1"
max="20"
value="5">

</label>

<label>

Glow

<input
type="range"
id="glow"
min="0"
max="100"
value="30">

</label>

<label>

Trail

<input
type="range"
id="trail"
min="1"
max="100"
value="15">

</label>

<label>

Bass Boost

<input
type="range"
id="bassBoost"
min="1"
max="10"
value="4">

</label>

<label>

Treble Boost

<input
type="range"
id="trebleBoost"
min="1"
max="10"
value="4">

</label>

<label>

    Center Size

    <input
    type="range"
    id="centerSize"
    min="20"
    max="250"
    value="120">

    </label>

<select id="colorMode">

    <option value="single">

    Single Color

    </option>

    <option value="gradient">

    Gradient

    </option>

    <option value="alternate">

    Alternate

    </option>

    </select>

    <label>

    Color 1

    <input
    type="color"
    id="color1"
    value="#00ffff">

    </label>

    <label>

    Color 2

    <input
    type="color"
    id="color2"
    value="#ff00ff">

    </label>

<input
type="file"
id="bgImage"
accept="image/*">

<button id="hideUI">

Hide UI

</button>

<button id="fullscreen">

Fullscreen

</button>

</div>

<button id="showPanel">

    ⚙️

    </button>

<canvas id="canvas"></canvas>

<script src="app.js"></script>

</body>

</html>
