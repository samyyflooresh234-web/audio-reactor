<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Audio Reactor 2.5</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="panel">

<h2>Audio Reactor</h2>

<input
type="file"
id="audioFile"
accept=".mp3,.wav,.m4a,.aac,.flac,.ogg,audio/*">

<button id="startBtn">
Activar Audio
</button>

<select id="mode">

<option value="ring">
Spectrum Ring
</option>

<option value="galaxy">
Galaxy
</option>

<option value="network">
Neural Network
</option>

<option value="fireworks">
Fireworks
</option>

</select>

<select id="theme">

<option value="rainbow">
Rainbow
</option>

<option value="cyber">
Cyberpunk
</option>

<option value="matrix">
Matrix
</option>

<option value="ocean">
Ocean
</option>

</select>

<label>

Sensitivity

<input
type="range"
id="sensitivity"
min="1"
max="6"
value="2">

</label>

<label>

Particles

<input
type="range"
id="particles"
min="100"
max="1000"
value="300">

</label>

<button id="fullscreen">
Fullscreen
</button>

</div>

<canvas id="canvas"></canvas>

<script src="app.js"></script>

</body>
</html>
