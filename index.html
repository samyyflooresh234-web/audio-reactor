<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Audio Reactor 2.0</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div id="ui">

<h2>Audio Reactor 2.0</h2>

<input
type="file"
id="audioFile"
accept=".mp3,.wav,.m4a,.aac,.flac,.ogg,audio/*">

<button id="startBtn">
Activar Audio
</button>

<select id="mode">

<option value="ring">
Spectrum Ring
</option>

<option value="galaxy">
Galaxy
</option>

<option value="fireworks">
Fireworks
</option>

</select>

</div>

<canvas id="canvas"></canvas>

<script src="app.js"></script>

</body>
</html>
